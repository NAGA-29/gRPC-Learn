version: v2
modules:
  - path: proto
lint:
  use:
    - STANDARD
  except:
    # 学習用リポジトリのため package 名にバージョンサフィックス（例: step02.v1）は付けない
    - PACKAGE_VERSION_SUFFIX
    # step05 のストリーミング例では StockPrice / FileChunk / ChatMessage など
    # ドメインを表す型名をそのまま使うため、Request/Response 命名規則は除外する
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
  ignore_only:
    # step10 は grpc.health.v1 の標準プロトコルを模倣するため、
    # enum 値名（UNKNOWN / SERVING / NOT_SERVING）をそのまま使う
    ENUM_VALUE_PREFIX:
      - proto/step10/production.proto
    ENUM_ZERO_VALUE_SUFFIX:
      - proto/step10/production.proto
breaking:
  use:
    - FILE
