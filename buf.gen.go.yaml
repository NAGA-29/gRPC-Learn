version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/grpc-learn
plugins:
  # Go — protobuf メッセージ生成
  - remote: buf.build/protocolbuffers/go
    out: gen
    opt:
      - paths=source_relative
  # Go — gRPC サービススタブ生成
  - remote: buf.build/grpc/go
    out: gen
    opt:
      - paths=source_relative
