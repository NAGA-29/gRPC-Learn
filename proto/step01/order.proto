syntax = "proto3";

// step01: Protobuf 基礎 — oneof / enum / repeated の学習
package step01;

option go_package = "github.com/grpc-learn/step01;step01";

// 注文ステータス
enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_PENDING     = 1;
  ORDER_STATUS_CONFIRMED   = 2;
  ORDER_STATUS_SHIPPED     = 3;
  ORDER_STATUS_DELIVERED   = 4;
  ORDER_STATUS_CANCELLED   = 5;
}

// 支払い方法（oneof の例）
message PaymentMethod {
  oneof method {
    CreditCard   credit_card   = 1;
    BankTransfer bank_transfer = 2;
    ConveniStore conveni_store = 3;
  }
}

message CreditCard   { string last_four = 1; string brand = 2; }
message BankTransfer { string bank_name = 1; string account = 2; }
message ConveniStore { string store_code = 1; string receipt_number = 2; }

// 注文明細
message OrderItem {
  string product_id = 1;
  string name       = 2;
  int32  quantity   = 3;
  double unit_price = 4;
}

// 注文
message Order {
  string          id             = 1;
  string          user_id        = 2;
  repeated OrderItem items       = 3; // repeated: 複数の明細
  OrderStatus     status         = 4;
  double          total          = 5;
  PaymentMethod   payment_method = 6; // oneof を持つ nested message
  string          created_at     = 7;
}
