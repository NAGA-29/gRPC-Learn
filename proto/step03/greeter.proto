syntax = "proto3";

// step03: クロス言語通信 — Go サーバー + Python クライアント
// step02 と同じ API 構造。クライアント言語の違いに集中できる。
package step03;

option go_package = "github.com/grpc-learn/step03;step03";

message SayHelloRequest {
  string name = 1;
}

message SayHelloResponse {
  string message     = 1;
  string server_host = 2; // サーバーのホスト名（クロス言語通信の確認用）
}

service GreeterService {
  rpc SayHello(SayHelloRequest) returns (SayHelloResponse);
}
