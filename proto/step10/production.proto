syntax = "proto3";

// step10: 本番対応 — TLS / ヘルスチェック / Observability
package step10;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/grpc-learn/step10;step10";

// 独自ヘルスチェック RPC（grpc.health.v1.Health サービスとは非互換。
// grpc_health_probe や Kubernetes の grpc probe を使う場合は
// google.golang.org/grpc/health パッケージの標準実装を別途登録してください）
message HealthCheckRequest  { string service = 1; }
message HealthCheckResponse {
  enum ServingStatus {
    UNKNOWN     = 0;
    SERVING     = 1;
    NOT_SERVING = 2;
  }
  ServingStatus status     = 1;
  string        message    = 2;
  google.protobuf.Timestamp checked_at = 3;
}

// Prometheus/OTel で収集したメトリクスを返す
message MetricsRequest  {}
message MetricsResponse {
  map<string, double> counters = 1; // カウンター（リクエスト数など）
  map<string, double> gauges   = 2; // ゲージ（メモリ使用量など）
}

service ProductionService {
  rpc Check      (HealthCheckRequest) returns (HealthCheckResponse);
  rpc GetMetrics (MetricsRequest)     returns (MetricsResponse);
}
