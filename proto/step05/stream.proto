syntax = "proto3";

// step05: Streaming — サーバー / クライアント / 双方向ストリーミング
package step05;

option go_package = "github.com/grpc-learn/step05;step05";

// --- サーバーストリーミング: 株価リアルタイム配信 ---
message WatchStockRequest  { string symbol = 1; }
message StockPrice {
  string symbol    = 1;
  double price     = 2;
  int64  timestamp = 3;
}

// --- クライアントストリーミング: ファイルアップロード ---
message FileChunk {
  bytes  data      = 1;
  int32  sequence  = 2;
  string file_name = 3;
}
message UploadFileSummary {
  string file_name   = 1; // 最初のチャンクから取得したファイル名
  int64  total_bytes = 2; // 受信した合計バイト数
  int32  chunk_count = 3; // 受信したチャンク数
  string message     = 4; // 完了メッセージ
}

// --- 双方向ストリーミング: チャット ---
message ChatMessage {
  string sender    = 1;
  string text      = 2;
  string room      = 3;
  string timestamp = 4;
}

service StreamService {
  // サーバーストリーミング: 株価を継続的に受信する
  rpc WatchStock(WatchStockRequest) returns (stream StockPrice);

  // クライアントストリーミング: ファイルをチャンクに分割して送信し、完了サマリを受け取る
  rpc UploadFile(stream FileChunk) returns (UploadFileSummary);

  // 双方向ストリーミング: チャットルーム
  rpc Chat(stream ChatMessage) returns (stream ChatMessage);
}
