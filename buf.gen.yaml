version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/grpc-learn
plugins:
  # Go — protobuf メッセージ生成
  - remote: buf.build/protocolbuffers/go
    out: .
    opt:
      - paths=source_relative
  # Go — gRPC サービススタブ生成
  - remote: buf.build/grpc/go
    out: .
    opt:
      - paths=source_relative
  # TypeScript — @connectrpc/connect（Node + ブラウザ対応）
  - remote: buf.build/connectrpc/es
    out: .
    opt:
      - target=ts
